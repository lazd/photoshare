<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Photo Share">
  <meta name="format-detection" content="telephone=no">
  <title>Photo Share</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" crossorigin="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="album-picker" id="albumPicker">
    <h1 class="album-picker-title">Photoshare</h1>
    <hr class="album-picker-divider">
    <div class="album-grid" id="albumGrid"></div>
  </div>
  <div class="album-view hidden" id="albumView">
  <button type="button" class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false">
    <svg viewBox="0 0 24 24" role="img" xmlns="http://www.w3.org/2000/svg" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" color="currentColor"><path d="M6 7L18 7M6 12L18 12M6 17L18 17"/></svg>
  </button>
  <div class="menu-overlay" id="menuOverlay" aria-hidden="true"></div>
  <nav class="menu-drawer" id="menuDrawer" aria-label="Main menu">
    <header class="menu-drawer-header">
      <button type="button" class="menu-back-btn" id="menuBackToAlbums" aria-label="Back to albums">
        <svg class="menu-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h2 class="menu-drawer-title" id="menuAlbumName">Albums</h2>
    </header>
    <ul class="menu-list">
      <li>
        <label class="menu-item menu-item-checkbox">
          <input type="checkbox" id="menuToggleMap">
          <span>Show map</span>
        </label>
      </li>
      <li>
        <span class="menu-item-label">Map tiles</span>
        <div class="menu-item-radio-group" role="radiogroup" aria-label="Map tiles">
          <label class="menu-radio-option">
            <input type="radio" name="mapTiles" value="map" checked>
            <span>Roadmap</span>
          </label>
          <label class="menu-radio-option">
            <input type="radio" name="mapTiles" value="satellite">
            <span>Satellite</span>
          </label>
        </div>
      </li>
    </ul>
  </nav>
  <div class="layout">
    <main class="main-content">
      <section class="photo-preview">
        <div class="photo-preview-inner" id="photoPreview">
          <p class="photo-placeholder">Click a photo on the timeline or map and use arrow keys to navigate</p>
        </div>
      </section>
      <section class="map-container">
        <div id="map"></div>
      </section>
    </main>
    <aside class="timeline">
      <div class="timeline-track" id="timeline"></div>
    </aside>
  </div>
  </div>
  <div class="fullscreen-overlay" id="fullscreenOverlay" aria-hidden="true">
    <div class="carousel-viewport"></div>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
