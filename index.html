<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Photo Share">
  <meta name="format-detection" content="telephone=no">
  <title>Photo Share</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" crossorigin="">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <main class="main-content">
      <section class="photo-preview">
        <div class="photo-preview-inner" id="photoPreview">
          <p class="photo-placeholder">Click a photo on the timeline or map and use arrow keys to navigate</p>
        </div>
      </section>
      <section class="map-container">
        <div id="map"></div>
      </section>
      <button type="button" class="map-btn map-minimize-btn" id="mapMinimizeBtn" title="Minimize map" aria-label="Minimize map" style="display: none">
        <svg class="map-btn-icon map-btn-minimize" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 7L7 17M7 7L17 17"/>
        </svg>
        <svg class="map-btn-icon map-btn-maximize" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z"/>
          <path d="M12 22C16 18 20 14.4183 20 10C20 5.58172 16.4183 2 12 2C7.58172 2 4 5.58172 4 10C4 14.4183 8 18 12 22Z"/>
        </svg>
      </button>
    </main>
    <aside class="timeline">
      <div class="timeline-track" id="timeline"></div>
    </aside>
  </div>
  <div class="fullscreen-overlay" id="fullscreenOverlay" aria-hidden="true">
    <div class="carousel-viewport"></div>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
